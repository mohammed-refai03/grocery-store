<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | FreshStore</title>
    <link rel="stylesheet" href="errorPage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <section class="error-page">
        <div class="container">
            <div class="error-content">
                <div class="error-icon">
                    <i class="fas fa-shopping-basket"></i>
                    <span class="error-code">404</span>
                </div>
                <h1>Oops! Your Basket is Empty</h1>
                <p>The page you're looking for seems to have expired or moved to a different aisle. Let's get you back to the fresh stuff!</p>
                
                <div class="error-actions">
                    <a href="index.html" class="btn-primary">Back to Home</a>
                    <a href="#contact" class="btn-outline">Report Issue</a>
                </div>

                <div class="suggested-links">
                    <span>Try searching for:</span>
                    <div class="tags">
                        <a href="#">Organic Fruits</a>
                        <a href="#">Fresh Dairy</a>
                        <a href="#">Weekly Deals</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
