<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Stackly Grocery Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <style>
        /* Essential CSS for showing/hiding errors */
        .error-msg {
            display: none;
            color: #ff4d4f;
            font-size: 0.75rem;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Shows error when parent group has 'invalid' class */
        .input-group.invalid .error-msg {
            display: block;
        }

        .input-group.invalid .input-wrapper {
            border: 1px solid #ff4d4f !important;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="auth-container" data-aos="fade-up">
        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Back to Stackly
        </a>

        <h2>Start Fresh</h2>
        <p class="subtitle">Join with our premium facility. Create your account to list and manage exclusive products.</p>

        <form id="signupForm" novalidate>
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="regName" placeholder="Enter your full name">
                </div>
                <small class="error-msg">Full name is required</small>
            </div>

            <div class="input-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <input type="email" id="regEmail" placeholder="e.g.hello@freshmart.com">
                </div>
                <small class="error-msg">Valid email required</small>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="regPass" placeholder="Min. 6 characters">
                    <i class="fas fa-eye toggle-password" style="cursor: pointer;"></i>
                </div>
                <small class="error-msg">Minimum 6 characters required</small>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="regPassConfirm" placeholder="Re-enter your password">
                    <i class="fas fa-eye toggle-password" style="cursor: pointer;"></i>
                </div>
                <small class="error-msg">Passwords must match</small>
            </div>

            <button type="submit" class="main-btn">Sign Up</button>
        </form>

        <p class="auth-toggle-prompt">
            Already have an account? 
            <a href="login.html" class="auth-link">Login here</a>
        </p>
    </div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        document.addEventListener('DOMContentLoaded', () => {
            // 1. Password Visibility Toggle
            const togglePasswords = document.querySelectorAll('.toggle-password');
            togglePasswords.forEach(icon => {
                icon.addEventListener('click', function() {
                    const input = this.parentElement.querySelector('input');
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.classList.replace('fa-eye', 'fa-eye-slash');
                    } else {
                        input.type = 'password';
                        this.classList.replace('fa-eye-slash', 'fa-eye');
                    }
                });
            });

            // 2. Real-time Error Clearing
            const inputs = document.querySelectorAll('.input-wrapper input');
            inputs.forEach(input => {
                input.addEventListener('input', function() {
                    this.closest('.input-group').classList.remove('invalid');
                });
            });

            // 3. Validation and Form Submission
            const form = document.getElementById('signupForm');
            const validateEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

            form.addEventListener('submit', (e) => {
                e.preventDefault(); // Stop immediate refresh/redirect
                
                let isValid = true;
                const name = document.getElementById('regName');
                const email = document.getElementById('regEmail');
                const pass = document.getElementById('regPass');
                const confirm = document.getElementById('regPassConfirm');

                // Clear previous error states
                document.querySelectorAll('.input-group').forEach(g => g.classList.remove('invalid'));

                // Validation Checks
                if (name.value.trim() === "") {
                    name.closest('.input-group').classList.add('invalid');
                    isValid = false;
                }
                if (!validateEmail(email.value)) {
                    email.closest('.input-group').classList.add('invalid');
                    isValid = false;
                }
                if (pass.value.length < 6) {
                    pass.closest('.input-group').classList.add('invalid');
                    isValid = false;
                }
                if (confirm.value === "" || confirm.value !== pass.value) {
                    confirm.closest('.input-group').classList.add('invalid');
                    isValid = false;
                }

                // Redirect only if ALL inputs are correct
                if (isValid) {
                    window.location.href = "index.html";
                }
            });
        });
    </script>
</body>
</html>
