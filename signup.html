<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Stackly Grocery Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="auth-container">
        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Back to Stackly
        </a>

        <h2>Start Fresh</h2>
        <p class="subtitle">Join with our premium facility. Create your account to list and manage exclusive products.</p>

        <form id="signupForm" novalidate>
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
                <small class="error-msg">Full name is required</small>
            </div>

            <div class="input-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <input type="email" id="regEmail" placeholder="e.g.hello@freshmart.com" required>
                </div>
                <small class="error-msg">Valid email required</small>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="regPass" placeholder="Min. 6 characters" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
                <small class="error-msg">Minimum 6 characters required</small>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="regPassConfirm" placeholder="Re-enter your password" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
                <small class="error-msg">Passwords must match</small>
            </div>

            <button type="submit" class="main-btn">
               <a href="index.html">Sign Up</a>
            </button>
        </form>

        <p class="auth-toggle-prompt">
            Already have an account? 
            <a href="login.html" class="auth-link">Login here</a>
        </p>
    </div>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
    duration: 1000,
    once: true
});
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Password Visibility Toggle
            const togglePasswords = document.querySelectorAll('.toggle-password');
            togglePasswords.forEach(icon => {
                icon.addEventListener('click', function() {
                    const input = this.parentElement.querySelector('input');
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.classList.replace('fa-eye', 'fa-eye-slash');
                    } else {
                        input.type = 'password';
                        this.classList.replace('fa-eye-slash', 'fa-eye');
                    }
                });
            });

            // 2. Real-time Error Clearing
            const inputs = document.querySelectorAll('.input-wrapper input');
            inputs.forEach(input => {
                input.addEventListener('input', function() {
                    this.parentElement.classList.remove('invalid');
                });
            });

            // 3. Validation and Form Submission
            const form = document.getElementById('signupForm');
            const setError = (input) => input.parentElement.classList.add('invalid');
            const validateEmail = (email) => String(email).toLowerCase().match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;
                
                const name = document.getElementById('regName');
                const email = document.getElementById('regEmail');
                const pass = document.getElementById('regPass');
                const confirm = document.getElementById('regPassConfirm');

                if (name.value.trim() === "") { setError(name); isValid = false; }
                if (!validateEmail(email.value)) { setError(email); isValid = false; }
                if (pass.value.length < 6) { setError(pass); isValid = false; }
                if (confirm.value !== pass.value || confirm.value === "") { 
                    setError(confirm); 
                    isValid = false; 
                }

                
            });
        });
    </script>
</body>
</html>
